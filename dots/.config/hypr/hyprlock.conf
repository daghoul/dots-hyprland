preload = ~/Pictures/Anime/jojoe.png
# BACKGROUND
background {
    monitor =
    path = ~/Pictures/Anime/jojoe.png
    blur_passes = 3
    blur_size = 3
    contrast = 1.0
    brightness = 0.5
    vibrancy = 0.0
    vibrancy_darkness = 0.0
}

# GENERAL
general {
    no_fade_in = true
    grace = 0
    disable_loading_bar = true
    hide_cursor = true
}

# INPUT FIELD
input-field {
    monitor =
    size = 256, 48
    outline_thickness = 0
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.5 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(17, 17, 17, 1.0)
    inner_color = rgba(200, 200, 200, 1.0)
    font_color = 0xff$foreground
    fail_color = 0xff$error
    check_color = 0xff$tertiary
    capslock_color = 0xff$secondary
    fade_on_empty = false
    #font_family = Iosevka Nerd Font
    placeholder_text = ... #text for input password
    hide_input = false
    position = 0, -100
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}

# TIME12
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M:%S %p")"
    color = 0xff$foreground
    font_size = 88
    #font_family = Iosevka Nerd Font Bold
    position = 0, 300
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}

# USER
label {
    monitor =
    text = cmd[update:1000] echo "$DESC"
    color = 0xff$foreground
    font_size = 14
    #font_family = Iosevka Nerd Font Bold Italic
    position = 0, -50
    halign = center
    valign = center
    shadow_passes = 1
    shadow_size = 5
    shadow_boost = 0.5
}

# PICTURE
image {
  path = ~/Pictures/Anime/31290312.jpg
  size = 100
  position = 0, 50
  rounding = 10
  halign = center
  valign = center
  border_size = 3
  border_color = 0xff$primary
  shadow_passes = 1
  shadow_size = 5
  shadow_boost = 0.5
}
